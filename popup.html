<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #15202b;
      color: #e7e9ea;
      padding: 0;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid #38444d;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
    }

    .header .logo {
      font-size: 22px;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #536471;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .slider {
      background: #1d9bf0;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(20px);
    }

    .stats {
      padding: 12px 16px;
      background: #192734;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #38444d;
    }

    .stats-count {
      font-size: 14px;
      color: #8899a6;
    }

    .stats-count strong {
      color: #1d9bf0;
      font-size: 18px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00ba7c;
      display: inline-block;
    }

    .status-dot.off {
      background: #f4212e;
    }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #38444d;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #8899a6;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .keyword-input-row {
      display: flex;
      gap: 8px;
    }

    .keyword-input-row input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #38444d;
      border-radius: 20px;
      background: #253341;
      color: #e7e9ea;
      font-size: 13px;
      outline: none;
    }

    .keyword-input-row input::placeholder {
      color: #536471;
    }

    .keyword-input-row input:focus {
      border-color: #1d9bf0;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary {
      background: #1d9bf0;
      color: #fff;
    }

    .btn-primary:hover {
      background: #1a8cd8;
    }

    .custom-keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
      max-height: 120px;
      overflow-y: auto;
    }

    .keyword-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: #253341;
      border: 1px solid #38444d;
      border-radius: 16px;
      font-size: 12px;
      color: #e7e9ea;
    }

    .keyword-tag .remove {
      cursor: pointer;
      color: #f4212e;
      font-weight: bold;
      font-size: 14px;
      line-height: 1;
      margin-left: 2px;
    }

    .keyword-tag .remove:hover {
      color: #ff6b6b;
    }

    .footer {
      padding: 12px 16px;
      text-align: center;
    }

    .footer a {
      color: #1d9bf0;
      text-decoration: none;
      font-size: 12px;
    }

    .empty-state {
      color: #536471;
      font-size: 12px;
      font-style: italic;
    }

    .blocked-log {
      max-height: 220px;
      overflow-y: auto;
    }

    .blocked-item {
      padding: 8px 0;
      border-bottom: 1px solid #2a3a4a;
      font-size: 12px;
    }

    .blocked-item:last-child {
      border-bottom: none;
    }

    .blocked-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .blocked-item-author {
      color: #1d9bf0;
      font-weight: 600;
    }

    .blocked-item-keyword {
      background: #253341;
      border: 1px solid #38444d;
      padding: 2px 8px;
      border-radius: 10px;
      color: #f4212e;
      font-size: 11px;
      font-weight: 600;
    }

    .blocked-item-text {
      color: #8899a6;
      line-height: 1.4;
      word-break: break-word;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .btn-small {
      padding: 4px 10px;
      border: 1px solid #38444d;
      border-radius: 14px;
      background: #253341;
      color: #8899a6;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-small:hover {
      background: #2c3e50;
      color: #e7e9ea;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="logo">🛡️</span>
      <h1>Timeline Peace</h1>
    </div>
    <label class="toggle">
      <input type="checkbox" id="toggleEnabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="stats">
    <div class="stats-count">
      Blocked: <strong id="hiddenCount">0</strong> tweets
    </div>
    <span class="status-dot" id="statusDot"></span>
  </div>

  <div class="section">
    <div class="section-title">Add Custom Keywords</div>
    <div class="keyword-input-row">
      <input type="text" id="keywordInput" placeholder="Add a keyword to filter...">
      <button class="btn btn-primary" id="addKeyword">Add</button>
    </div>
    <div class="custom-keywords" id="customKeywordsList"></div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title">Recent Blocked Tweets</div>
      <button class="btn-small" id="clearLog">Clear</button>
    </div>
    <div class="blocked-log" id="blockedLog"></div>
  </div>

  <div class="footer">
    <span style="color: #536471; font-size: 12px;">
      Filtering religion content from your timeline
    </span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
